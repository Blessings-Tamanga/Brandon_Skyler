<!DOCTYPE html>
<html>
<head>
  <title>Admin Login - Brandon Skyler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto; padding: 40px; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
    h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 24px; }
    .input-group { position: relative; margin-bottom: 20px; }
    input { width: 100%; padding: 12px 16px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 16px; transition: border-color 0.2s; box-sizing: border-box; }
    input:focus { outline: none; border-color: #667eea; }
    button { width: 100%; padding: 14px; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .dashboard-link { text-align: center; margin-top: 20px; }
    .dashboard-btn { display: inline-block; padding: 10px 20px; background: #10b981; color: white; text-decoration: none; border-radius: 6px; font-weight: 500; transition: all 0.2s; }
    .dashboard-btn:hover { background: #059669; transform: translateY(-1px); }
    .status { text-align: center; margin-top: 15px; padding: 10px; border-radius: 6px; font-size: 14px; }
    .success { background: #d1fae5; color: #065f46; }
    .error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>🔐 Admin Login</h1>
    
    <div id="loginForm">
      <div class="input-group">
        <input type="text" id="username" placeholder="Username" value="admin">
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder="Password" value="password">
      </div>
      <button id="loginBtn">Login → Dashboard</button>
    </div>

    <div id="dashboardContainer" style="display: none;">
      <div class="status success" id="statusMsg"></div>
      <div class="dashboard-link">
        <a id="dashboardLink" class="dashboard-btn" href="#" target="_blank">📊 Open Dashboard</a>
      </div>
    </div>
  </div>

  <script>
    let jwtToken = null;

    document.getElementById('loginBtn').onclick = async () => {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const status = document.getElementById('statusMsg');

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.error || 'Login failed');

        jwtToken = data.token;
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('dashboardContainer').style.display = 'block';
        document.getElementById('statusMsg').textContent = `✅ Logged in! Expires in ${data.expiresIn / 3600} hours`;
        document.getElementById('dashboardLink').href = `/dashboard.html?token=${jwtToken}`;
        
      } catch (err) {
        document.getElementById('statusMsg').textContent = `❌ ${err.message}`;
        document.getElementById('statusMsg').className = 'status error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login → Dashboard';
      }
    };

    // Enter key support
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && document.getElementById('loginForm').style.display !== 'none') {
        document.getElementById('loginBtn').click();
      }
    });
  </script>
</body>
</html>
